---
version: '3'

tasks:
  donothing:
    summary: |
      Add CLOUDFLARE_ACCOUNT_ID to package.json blueprint
      Add Cloudflare_API_TOKEN to globals
    cmds:
      - task donothing

  drift:check:
    desc: Check for unmanaged config drift between live system and chezmoi source
    cmds:
      - bash scripts/drift-check.sh

  drift:check:json:
    desc: Check for drift with machine-readable JSON output
    cmds:
      - bash scripts/drift-check.sh --json

  drift:fix:
    desc: Auto-apply chezmoi to resolve detected drift
    cmds:
      - bash scripts/drift-check.sh --fix
